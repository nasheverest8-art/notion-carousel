<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Carousel</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="carousel">
        <div class="slides" id="slides">

            <div class="slide">
                <img src="https://picsum.photos/id/1015/1200/700" alt="">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1016/1200/700" alt="">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1025/1200/700" alt="">
            </div>

        </div>

        <button class="nav prev" onclick="moveSlide(-1)">
            ❮
        </button>

        <button class="nav next" onclick="moveSlide(1)">
            ❯
        </button>

        <div class="dots" id="dots"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
